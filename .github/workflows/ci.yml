name: CI

on:
  push:
    branches: ['**']
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    branches: ['**']
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-features -- -D warnings
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Accept the informational "bincode is unmaintained" advisory: it is a
          # transitive dependency with no security vulnerability, and the
          # advisory postdates the last green run. Reporting it also makes the
          # action fail on push events ("Resource not accessible by
          # integration") when it tries to file an issue without issues:write.
          ignore: RUSTSEC-2025-0141

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          # Pin cbindgen: the committed api/oxidex.h is generated with 0.29.2,
          # and newer cbindgen emits extra #define macros that would fail the
          # "Verify C header is up-to-date" check non-deterministically.
          tool: cargo-nextest,cbindgen@0.29.2
      - run: cargo build --release --all-features --features tag-comparison-binary
      # Tests run in the (unwind) test profile: the release profile sets
      # panic = "abort", which newer cargo refuses to mix with the unwind test
      # harness. The release artifacts themselves are covered by the build step
      # above and the multi-platform jobs.
      - run: cargo nextest run --all-features --features tag-comparison-binary
      - name: C FFI integration test
        run: cargo test --test ffi_c_integration -- --nocapture
      - name: Run doc tests
        run: cargo test --doc --all-features
      - name: Verify C header is up-to-date
        run: |
          cbindgen --config cbindgen.toml --crate oxidex --output api/oxidex.h.tmp
          diff -q api/oxidex.h api/oxidex.h.tmp || (echo "C header out of date" && exit 1)
          rm api/oxidex.h.tmp
      - name: Install ExifTool
        run: sudo apt-get update -qq && sudo apt-get install -y libimage-exiftool-perl
      - name: Integration tests (ExifTool comparison)
        run: cargo test --features exiftool-comparison

  multi-platform:
    name: Multi-platform Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: warp-ubuntu-latest-arm64-2x
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools musl-dev
      - run: cargo build --release --target ${{ matrix.target }}
      - run: ls -lh target/${{ matrix.target }}/release/oxidex

  metrics:
    name: Benchmarks & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run benchmarks
        run: cargo bench --bench integration_benchmarks --bench parse_benchmarks
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 90
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin --verbose --all-features --workspace --timeout 300 --out xml --output-dir ./coverage
      - uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage/cobertura.xml
