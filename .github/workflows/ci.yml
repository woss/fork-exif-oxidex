name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build
        run: cargo build --verbose --all-features

      - name: Run tests
        run: cargo test --verbose --all-features

      - name: Run Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install cbindgen
        run: cargo install cbindgen --locked

      - name: Verify C header is up-to-date
        run: |
          cbindgen --config cbindgen.toml --crate exiftool-rs --output api/exiftool_rs.h.tmp
          if ! diff -q api/exiftool_rs.h api/exiftool_rs.h.tmp; then
            echo "Error: C header file is out of date. Please regenerate it with:"
            echo "  cbindgen --config cbindgen.toml --crate exiftool-rs --output api/exiftool_rs.h"
            echo ""
            echo "Differences:"
            diff api/exiftool_rs.h api/exiftool_rs.h.tmp || true
            exit 1
          fi
          rm api/exiftool_rs.h.tmp
          echo "C header file is up-to-date"

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run cargo-audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration Tests (ExifTool Comparison)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Perl ExifTool (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl
          exiftool -ver

      - name: Install Perl ExifTool (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install exiftool
          exiftool -ver

      - name: Install Perl ExifTool (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install exiftool -y
          exiftool -ver

      - name: Build ExifTool-RS
        run: cargo build --release --all-features

      - name: Run integration tests with ExifTool comparison
        run: cargo test --release --features exiftool-comparison -- --nocapture

      - name: Generate comparison report
        if: always()
        run: |
          echo "# ExifTool Comparison Test Results" > comparison_report.md
          echo "" >> comparison_report.md
          echo "**Platform:** ${{ matrix.os }}" >> comparison_report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> comparison_report.md
          echo "" >> comparison_report.md
          echo "See test output above for detailed match rates." >> comparison_report.md

      - name: Upload comparison report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comparison-report-${{ matrix.os }}
          path: comparison_report.md
          retention-days: 90
