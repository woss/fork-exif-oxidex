name: Sync ExifTool Tags

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:  # Manual trigger

jobs:
  sync-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check ExifTool version
        id: check
        run: |
          CURRENT=$(cat .exiftool-version 2>/dev/null || echo "none")
          LATEST=$(curl -s https://api.github.com/repos/exiftool/exiftool/commits/master | jq -r '.sha[:7]')
          LATEST_FULL=$(curl -s https://api.github.com/repos/exiftool/exiftool/commits/master | jq -r '.sha')
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "latest_full=$LATEST_FULL" >> $GITHUB_OUTPUT
          echo "Current: $CURRENT, Latest: $LATEST"

      - name: Setup Rust toolchain
        if: steps.check.outputs.current != steps.check.outputs.latest
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        if: steps.check.outputs.current != steps.check.outputs.latest
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Regenerate tag database
        if: steps.check.outputs.current != steps.check.outputs.latest
        run: |
          echo "Removing cached generated files to force regeneration..."
          rm -f src/tag_db/generated_tags.rs
          rm -rf target/*/build/oxidex-*/out/exiftool-source

          echo "Building to regenerate tags from ExifTool ${{ steps.check.outputs.latest }}..."
          cargo build --release 2>&1 | tee build.log

          echo "Saving ExifTool version..."
          echo "${{ steps.check.outputs.latest }}" > .exiftool-version

      - name: Count tags
        if: steps.check.outputs.current != steps.check.outputs.latest
        id: count
        run: |
          if [ -f src/tag_db/generated_tags.rs ]; then
            TAG_COUNT=$(grep -o "generated_tag_count.*[0-9]" src/tag_db/generated_tags.rs | grep -o '[0-9]*' || echo "unknown")
            echo "tag_count=$TAG_COUNT" >> $GITHUB_OUTPUT
          else
            echo "tag_count=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check.outputs.current != steps.check.outputs.latest
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: [BETA] sync tags from ExifTool ${{ steps.check.outputs.latest }}

            Automatically synced tag database from ExifTool master branch.

            ExifTool commit: https://github.com/exiftool/exiftool/commit/${{ steps.check.outputs.latest_full }}
          title: "[BETA] Sync tags from ExifTool ${{ steps.check.outputs.latest }}"
          body: |
            ## Automated Tag Database Sync

            This PR was automatically generated by the `sync-exiftool-tags` workflow.

            ### Changes
            - **ExifTool Version:** [`${{ steps.check.outputs.latest }}`](https://github.com/exiftool/exiftool/commit/${{ steps.check.outputs.latest_full }})
            - **Previous Version:** `${{ steps.check.outputs.current }}`
            - **Tag Count:** ${{ steps.count.outputs.tag_count }}

            ### What to Check
            - [ ] Build passes CI
            - [ ] Tag count is reasonable (should be ~32,000+)
            - [ ] No regressions in metadata extraction tests

            ### Notes
            This is a **[BETA]** automated sync. Please review carefully before merging.

            ---
            *Generated by [sync-exiftool-tags.yml](/.github/workflows/sync-exiftool-tags.yml)*
          branch: auto-sync-exiftool-tags
          delete-branch: true
          labels: |
            beta
            automated
            dependencies
