name: Sync ExifTool Tags

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:  # Manual trigger

jobs:
  sync-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check ExifTool version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT=$(cat .exiftool-version 2>/dev/null || echo "none")

          # Get commit info from ExifTool repo
          COMMIT_JSON=$(gh api repos/exiftool/exiftool/commits/master)
          LATEST_FULL=$(echo "$COMMIT_JSON" | jq -r '.sha')
          LATEST=${LATEST_FULL:0:7}
          COMMIT_MSG=$(echo "$COMMIT_JSON" | jq -r '.commit.message' | head -1)

          # Extract version number if commit message is like "Update to 13.43"
          if [[ "$COMMIT_MSG" =~ [0-9]+\.[0-9]+ ]]; then
            EXIFTOOL_VERSION="${BASH_REMATCH[0]}"
          else
            EXIFTOOL_VERSION="$LATEST"
          fi

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "latest_full=$LATEST_FULL" >> $GITHUB_OUTPUT
          echo "exiftool_version=$EXIFTOOL_VERSION" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "Current: $CURRENT, Latest: $LATEST (ExifTool v$EXIFTOOL_VERSION)"

      - name: Setup Rust toolchain
        if: steps.check.outputs.current != steps.check.outputs.latest
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        if: steps.check.outputs.current != steps.check.outputs.latest
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Regenerate tag database
        if: steps.check.outputs.current != steps.check.outputs.latest
        run: |
          echo "Removing cached generated files to force regeneration..."
          rm -f src/tag_db/generated_tags.rs
          rm -rf target/*/build/oxidex-*/out/exiftool-source

          echo "Building to regenerate tags from ExifTool ${{ steps.check.outputs.latest }}..."
          cargo build --release 2>&1 | tee build.log

          echo "Saving ExifTool version..."
          echo "${{ steps.check.outputs.latest_full }}" > .exiftool-version

      - name: Count tags
        if: steps.check.outputs.current != steps.check.outputs.latest
        id: count
        run: |
          if [ -f src/tag_db/generated_tags.rs ]; then
            # Extract the number from: pub fn generated_tag_count() -> usize { 32681 }
            TAG_COUNT=$(grep -A1 "fn generated_tag_count" src/tag_db/generated_tags.rs | grep -oE '[0-9]+' | head -1)
            TAG_COUNT=${TAG_COUNT:-unknown}
            echo "tag_count=$TAG_COUNT" >> $GITHUB_OUTPUT
          else
            echo "tag_count=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check.outputs.current != steps.check.outputs.latest
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: sync tags from ExifTool v${{ steps.check.outputs.exiftool_version }}

            Automatically synced tag database from ExifTool master branch.
            Tag count: ${{ steps.count.outputs.tag_count }}

            ExifTool commit: https://github.com/exiftool/exiftool/commit/${{ steps.check.outputs.latest_full }}
          title: "Sync tags from ExifTool v${{ steps.check.outputs.exiftool_version }}"
          body: |
            ## ExifTool Tag Database Sync

            Automatically synced metadata tag definitions from [ExifTool](https://exiftool.org/) v${{ steps.check.outputs.exiftool_version }}.

            ### Version Info
            | Field | Value |
            |-------|-------|
            | **ExifTool Version** | v${{ steps.check.outputs.exiftool_version }} |
            | **Commit** | [`${{ steps.check.outputs.latest }}`](https://github.com/exiftool/exiftool/commit/${{ steps.check.outputs.latest_full }}) |
            | **Commit Message** | ${{ steps.check.outputs.commit_msg }} |
            | **Previous Commit** | `${{ steps.check.outputs.current }}` |

            ### Generated Tags
            - **Total Tag Count:** ${{ steps.count.outputs.tag_count }} tags

            ### Files Changed
            - `src/tag_db/generated_tags.rs` - Regenerated tag database from ExifTool source
            - `.exiftool-version` - Updated to track synced commit

            ### What This Updates
            The tag database contains metadata field definitions parsed from ExifTool's Perl source code, including:
            - Tag names and descriptions
            - Data types and formats
            - Group/category assignments
            - Value mappings and enumerations

            ### Review Checklist
            - [ ] CI passes (build + tests)
            - [ ] Tag count is reasonable (~32,000+ expected)
            - [ ] No test regressions

            ---
            *Auto-generated by [sync-exiftool-tags.yml](/.github/workflows/sync-exiftool-tags.yml)*
          branch: auto-sync-exiftool-tags
          delete-branch: true
          labels: |
            automated
            dependencies
