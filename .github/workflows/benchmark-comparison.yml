name: Benchmark Comparison

# Automated benchmark comparison workflow that compares Perl ExifTool with Rust ExifTool
# and automatically updates the README.md with the latest benchmark results.
# Only runs on pushes to main branch to avoid infinite loops and unnecessary runs.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  benchmark-comparison:
    name: Compare Perl ExifTool vs Rust ExifTool
    runs-on: swack
    timeout-minutes: 30
    permissions:
      contents: write # Required for git push to update README.md

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # Full history for proper git operations

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Install dependencies
        run: |
          echo "Installing Perl ExifTool..."
          sudo apt-get update -qq
          sudo apt-get install -y libimage-exiftool-perl bc jq wget cc

          echo "Installing hyperfine..."
          wget https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine_1.18.0_amd64.deb
          sudo dpkg -i hyperfine_1.18.0_amd64.deb

          echo "Verifying installations..."
          exiftool -ver
          hyperfine --version
          bc --version | head -1
          jq --version

      - name: Build OxiDex in release mode
        run: cargo build --release --verbose

      - name: Run benchmark comparison script
        id: run-benchmarks
        run: |
          echo "Running benchmark comparison..."
          chmod +x benches/exiftool_comparison.sh
          ./benches/exiftool_comparison.sh

          # Verify benchmark results were generated
          if [ ! -f benches/benchmark_results.json ]; then
            echo "Error: benchmark_results.json not found"
            exit 1
          fi

          echo "Benchmark results generated successfully"

          # Extract key metrics for summary
          SINGLE_FILE_SPEEDUP=$(jq -r '.single_file.results[0].mean / .single_file.results[1].mean' benches/benchmark_results.json | bc -l | xargs printf "%.1f")
          BATCH_SPEEDUP=$(jq -r '.batch.results[0].mean / .batch.results[1].mean' benches/benchmark_results.json | bc -l | xargs printf "%.1f")
          WRITE_SPEEDUP=$(jq -r '.write.results[0].mean / .write.results[1].mean' benches/benchmark_results.json | bc -l | xargs printf "%.1f")
          DETECTION_SPEEDUP=$(jq -r '.detection.results[0].mean / .detection.results[1].mean' benches/benchmark_results.json | bc -l | xargs printf "%.1f")

          echo "single_file_speedup=$SINGLE_FILE_SPEEDUP" >> $GITHUB_OUTPUT
          echo "batch_speedup=$BATCH_SPEEDUP" >> $GITHUB_OUTPUT
          echo "write_speedup=$WRITE_SPEEDUP" >> $GITHUB_OUTPUT
          echo "detection_speedup=$DETECTION_SPEEDUP" >> $GITHUB_OUTPUT

      - name: Install Python for README update script
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: "3.11"

      - name: Update README.md with benchmark results
        run: |
          python3 .github/scripts/update_readme_benchmarks.py

      - name: Check if README.md changed
        id: check-changes
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to README.md"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "README.md has been updated with new benchmark results"
            echo ""
            echo "Changes:"
            git diff README.md
          fi

      - name: Commit and push README updates
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          git commit -m "chore: update benchmark results [skip ci]

          Updated Performance Benchmarks section with latest results:
          - Single file: ${{ steps.run-benchmarks.outputs.single_file_speedup }}x faster
          - Batch processing: ${{ steps.run-benchmarks.outputs.batch_speedup }}x faster
          - Write operations: ${{ steps.run-benchmarks.outputs.write_speedup }}x faster
          - Format detection: ${{ steps.run-benchmarks.outputs.detection_speedup }}x faster

          Generated by benchmark-comparison workflow
          Platform: Linux (x86_64)
          Runner: puzl-ubuntu-latest"

          git push

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-comparison-results
          path: |
            benches/benchmark_results.md
            benches/benchmark_results.json
          retention-days: 90

      - name: Generate job summary
        if: always()
        run: |
          echo "# Benchmark Comparison Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Performance Improvements" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scenario | Speedup |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Single File Read | **${{ steps.run-benchmarks.outputs.single_file_speedup }}x faster** |" >> $GITHUB_STEP_SUMMARY
          echo "| Batch Processing (1000 files) | **${{ steps.run-benchmarks.outputs.batch_speedup }}x faster** |" >> $GITHUB_STEP_SUMMARY
          echo "| Write Operation | **${{ steps.run-benchmarks.outputs.write_speedup }}x faster** |" >> $GITHUB_STEP_SUMMARY
          echo "| Format Detection | **${{ steps.run-benchmarks.outputs.detection_speedup }}x faster** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## System Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: Linux (x86_64)" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner**: puzl-ubuntu-latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Perl ExifTool**: $(exiftool -ver)" >> $GITHUB_STEP_SUMMARY
          echo "- **OxiDex**: $(grep '^version' Cargo.toml | head -1 | cut -d'\"' -f2)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-changes.outputs.changed }}" = "true" ]; then
            echo "✅ README.md updated with latest benchmark results" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes to README.md (results unchanged)" >> $GITHUB_STEP_SUMMARY
          fi
