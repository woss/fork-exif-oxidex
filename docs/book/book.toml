[book]
title = "OxiDex User Guide"
authors = ["OxiDex Contributors"]
language = "en"
multilingual = false
src = "src"
description = "Comprehensive guide to using OxiDex for reading, writing, and editing metadata in 300+ file formats"

[build]
build-dir = "book"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/swack-tools/oxidex"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/swack-tools/oxidex/edit/main/docs/book/{path}"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
