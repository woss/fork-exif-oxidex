name: ExifTool Compatibility Report

on:
  push:
    branches: [main]
    paths:
      - 'src/parsers/**'
      - 'src/bin/tag-comparison/**'
  workflow_dispatch:

jobs:
  compare:
    runs-on: arc-runner-set
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run full ExifTool comparison
        run: just compare-exiftool-full-update

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reference/comparison/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            EXIFTOOL_VERSION=$(curl -s https://exiftool.org/ver.txt)
            OXIDEX_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            git commit -m "docs: update ExifTool compatibility report

          ExifTool: v$EXIFTOOL_VERSION
          OxiDex: v$OXIDEX_VERSION"
            git push
          fi
