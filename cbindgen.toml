# cbindgen configuration for ExifTool-RS C FFI
# This file configures automatic C header generation from Rust FFI code

language = "C"
include_guard = "EXIFTOOL_RS_H"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
documentation = true
documentation_style = "c"
line_length = 100
tab_width = 4

[parse]
# Only parse this crate, not dependencies
parse_deps = false
include = ["exiftool-rs"]

[export]
# Only export functions with the exiftool_ prefix and error constants
include = ["exiftool_*", "EXIFTOOL_*"]
# Use full item names (no renaming)
rename = {}

[fn]
# Use standard C naming conventions
rename_args = "None"
# Add documentation above function declarations
must_use = "C"

[struct]
# Ensure proper struct handling
rename_fields = "None"

[enum]
# Ensure proper enum handling
rename_variants = "None"

[const]
# Allow constant exports
allow_static_const = true
allow_constexpr = false

[defines]
# No preprocessor defines needed

# [layout] section removed - using defaults
