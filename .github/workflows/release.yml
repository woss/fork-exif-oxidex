name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 - native build on x64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          # Linux ARM64 - native build on arm64
          - target: aarch64-unknown-linux-musl
            os: warp-ubuntu-latest-arm64-2x
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools musl-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/oxidex

      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Copy binary to artifacts
        run: |
          cp target/${{ matrix.target }}/release/oxidex artifacts/oxidex-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxidex-${{ matrix.target }}
          path: artifacts/oxidex-${{ matrix.target }}
          retention-days: 1

  build-windows:
    name: Build Windows (x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y mingw-w64 gcc

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-gnu
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc

      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Copy binary to artifacts
        run: |
          cp target/x86_64-pc-windows-gnu/release/oxidex.exe artifacts/oxidex-x86_64-pc-windows-gnu.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxidex-x86_64-pc-windows-gnu
          path: artifacts/oxidex-x86_64-pc-windows-gnu.exe
          retention-days: 1

  build-macos:
    name: Build and Sign macOS (aarch64)
    runs-on: warp-macos-15-arm64-6x
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Install dependencies
        run: |
          brew install just create-dmg

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "Available signing identities:"
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Build release
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          just build-release

      - name: Sign binary
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          APP_PATH="./target/release/oxidex"
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          IDENTITY=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep "Developer ID Application" | head -1 | grep -o '".*"' | tr -d '"')

          if [ -z "$IDENTITY" ]; then
            echo "Error: No Developer ID Application certificate found"
            exit 1
          fi

          echo "Found signing identity: $IDENTITY"
          echo "Signing binary with Developer ID certificate..."
          codesign --sign "$IDENTITY" \
            --timestamp \
            --options runtime \
            --verbose \
            --keychain $KEYCHAIN_PATH \
            "$APP_PATH"

          echo "Verifying signature..."
          codesign --verify --verbose "$APP_PATH"

          echo "Displaying signature details..."
          codesign --display --verbose=4 "$APP_PATH"

          echo "✓ Binary signed successfully"

      - name: Create DMG
        run: |
          just create-dmg v${{ steps.version.outputs.version }}

      - name: Notarize DMG
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          DMG_PATH="dist/oxidex-v${{ steps.version.outputs.version }}.dmg"

          echo "Submitting DMG for notarization..."
          SUBMISSION_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --wait 2>&1)

          echo "$SUBMISSION_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMISSION_OUTPUT" | grep -E "^\s+id:" | head -1 | awk '{print $2}' | tr -d '[:space:]')

          echo "Extracted submission ID: $SUBMISSION_ID"

          if echo "$SUBMISSION_OUTPUT" | grep -q "status: Accepted"; then
            echo "✓ Notarization accepted"
          else
            echo "❌ Notarization failed, fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" developer_log.json \
              --apple-id "$NOTARIZATION_APPLE_ID" \
              --password "$NOTARIZATION_PASSWORD" \
              --team-id "$NOTARIZATION_TEAM_ID"

            echo "Notarization error details:"
            cat developer_log.json
            exit 1
          fi

          echo "Stapling notarization ticket to DMG..."
          xcrun stapler staple "$DMG_PATH"

          echo "Verifying DMG notarization..."
          xcrun stapler validate "$DMG_PATH"

          echo "✓ DMG notarized and stapled successfully"

      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Copy signed binary and DMG to artifacts
        run: |
          cp target/release/oxidex artifacts/oxidex-aarch64-apple-darwin
          cp dist/oxidex-v${{ steps.version.outputs.version }}.dmg artifacts/

      - name: Upload signed binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxidex-aarch64-apple-darwin
          path: artifacts/oxidex-aarch64-apple-darwin
          retention-days: 1

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxidex-dmg
          path: artifacts/oxidex-v${{ steps.version.outputs.version }}.dmg
          retention-days: 1

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Linux x64 (musl static binary)
          cp artifacts/oxidex-x86_64-unknown-linux-musl/oxidex-x86_64-unknown-linux-musl release-assets/
          # Linux ARM64 (musl static binary)
          cp artifacts/oxidex-aarch64-unknown-linux-musl/oxidex-aarch64-unknown-linux-musl release-assets/
          # Windows x64
          cp artifacts/oxidex-x86_64-pc-windows-gnu/oxidex-x86_64-pc-windows-gnu.exe release-assets/
          # macOS signed binary (ARM64)
          cp artifacts/oxidex-aarch64-apple-darwin/oxidex-aarch64-apple-darwin release-assets/
          # macOS DMG (signed and notarized)
          cp artifacts/oxidex-dmg/*.dmg release-assets/

      - name: Extract version and create release notes
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          cat > release-notes.md << 'EOF'
          ## OxiDex v$VERSION

          ### Release Artifacts

          **Linux:**
          - `oxidex-x86_64-unknown-linux-musl` - Linux x86_64 (musl, static binary)
          - `oxidex-aarch64-unknown-linux-musl` - Linux ARM64 (musl, static binary)

          **Windows:**
          - `oxidex-x86_64-pc-windows-gnu.exe` - Windows x86_64

          **macOS:**
          - `oxidex-aarch64-apple-darwin` - Signed macOS ARM64 binary
          - `oxidex-v$VERSION.dmg` - Signed and notarized macOS DMG installer

          ### Installation

          **Linux/macOS:**
          ```bash
          # Download the appropriate binary
          chmod +x oxidex-*
          sudo mv oxidex-* /usr/local/bin/oxidex
          ```

          **Windows:**
          Download and run `oxidex-x86_64-pc-windows-gnu.exe`

          **macOS DMG:**
          1. Download and open the DMG file
          2. Drag OxiDex to Applications or desired location
          3. No security warnings - fully signed and notarized by Apple

          ### Note
          The macOS artifacts are signed with a Developer ID certificate and the DMG is notarized by Apple for secure installation.
          EOF

          # Replace $VERSION in the file with actual version
          sed -i "s/\$VERSION/$VERSION/g" release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-docs:
    name: Update GitHub Pages
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Fetch main branch changelog
        run: |
          git fetch origin main
          git show origin/main:CHANGELOG.md > main-changelog.md

      - name: Update gh-pages changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract the section for this version from main branch changelog
          # Look for the version heading and extract until the next version heading or end
          awk -v ver="$VERSION" '
            /^## \['"$VERSION"'\]/ { found=1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' main-changelog.md > version-entry.md

          # Check if we found the version entry
          if [ ! -s version-entry.md ]; then
            echo "Warning: No entry found for version $VERSION in main changelog"
            echo "Creating a basic entry..."
            cat > version-entry.md << EOF
          ## [$VERSION] - $(date +%Y-%m-%d)

          See [GitHub Release](https://github.com/swack-tools/oxidex/releases/tag/v$VERSION) for details.
          EOF
          fi

          # Insert the new version entry after the ## [Unreleased] section
          awk -v entry="$(cat version-entry.md)" '
            /^## \[Unreleased\]/ {
              print
              # Print blank line, then the new entry, then another blank line
              print ""
              print entry
              print ""
              next
            }
            # Skip if this is the first occurrence of our version (avoid duplicates)
            /^## \['"$VERSION"'\]/ && !seen { seen=1; next }
            seen && /^## \[/ { seen=0 }
            !seen || !/^## \['"$VERSION"'\]/
          ' changelog.md > changelog-updated.md

          mv changelog-updated.md changelog.md

          # Clean up
          rm -f main-changelog.md version-entry.md

      - name: Update VitePress version dropdown
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update the version in .vitepress/config.mts
          sed -i "s/text: 'v[0-9.]*',/text: 'v$VERSION',/" .vitepress/config.mts

          echo "✓ Updated version dropdown to v$VERSION"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add changelog.md .vitepress/config.mts
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update to v${{ steps.version.outputs.version }}"
            git push origin gh-pages
            echo "✓ Documentation updated on gh-pages"
          fi
