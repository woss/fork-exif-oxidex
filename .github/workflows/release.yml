name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-alpha') || contains(steps.get_version.outputs.version, '-beta') || contains(steps.get_version.outputs.version, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (static musl)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            binary_name: exiftool-rs
            archive_name: exiftool-rs-x86_64-linux-musl.tar.gz

          # Linux ARM64 (static musl)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            binary_name: exiftool-rs
            archive_name: exiftool-rs-aarch64-linux-musl.tar.gz

          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            binary_name: exiftool-rs
            archive_name: exiftool-rs-x86_64-macos.tar.gz

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            binary_name: exiftool-rs
            archive_name: exiftool-rs-aarch64-macos.tar.gz

          # Windows x86_64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            use_cross: true
            binary_name: exiftool-rs.exe
            archive_name: exiftool-rs-x86_64-windows.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-release-

      - name: Build with cross
        if: matrix.use_cross
        run: |
          cross build --release --target ${{ matrix.target }}

      - name: Build with cargo (macOS native)
        if: "!matrix.use_cross"
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Verify binary
        run: |
          ls -lh target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          file target/${{ matrix.target }}/release/${{ matrix.binary_name }} || true

      - name: Strip binary (non-Windows)
        if: "!contains(matrix.target, 'windows')"
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary_name }} || true

      - name: Create archive (Linux/macOS)
        if: "!contains(matrix.target, 'windows')"
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive_name }} ${{ matrix.binary_name }}
          cd ../../..
          sha256sum ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256

      - name: Create archive (Windows)
        if: contains(matrix.target, 'windows')
        run: |
          cd target/${{ matrix.target }}/release
          zip ../../../${{ matrix.archive_name }} ${{ matrix.binary_name }}
          cd ../../..
          sha256sum ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256

      - name: Display binary size
        run: |
          ls -lh ${{ matrix.archive_name }}
          echo "SHA256:"
          cat ${{ matrix.archive_name }}.sha256

      - name: Upload binary to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-release:
    name: Verify Release
    needs: [create-release, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check release artifacts
        run: |
          echo "Release ${{ needs.create-release.outputs.version }} completed"
          echo "Expected artifacts:"
          echo "  - exiftool-rs-x86_64-linux-musl.tar.gz"
          echo "  - exiftool-rs-aarch64-linux-musl.tar.gz"
          echo "  - exiftool-rs-x86_64-macos.tar.gz"
          echo "  - exiftool-rs-aarch64-macos.tar.gz"
          echo "  - exiftool-rs-x86_64-windows.zip"
          echo "  + corresponding .sha256 checksums"
