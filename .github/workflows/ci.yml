name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: warp-ubuntu-latest-x64-4x
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2
        with:
          cache-on-failure: true

      - name: Build
        run: cargo build --release --verbose --all-features

      - name: Run tests
        run: cargo test --release --verbose --all-features

      - name: Run Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install cbindgen
        run: cargo install cbindgen --locked

      - name: Verify C header is up-to-date
        run: |
          cbindgen --config cbindgen.toml --crate exiftool-rs --output api/exiftool_rs.h.tmp
          if ! diff -q api/exiftool_rs.h api/exiftool_rs.h.tmp; then
            echo "Error: C header file is out of date. Please regenerate it with:"
            echo "  cbindgen --config cbindgen.toml --crate exiftool-rs --output api/exiftool_rs.h"
            echo ""
            echo "Differences:"
            diff api/exiftool_rs.h api/exiftool_rs.h.tmp || true
            exit 1
          fi
          rm api/exiftool_rs.h.tmp
          echo "C header file is up-to-date"

  audit:
    name: Security Audit
    runs-on: warp-ubuntu-latest-x64-4x
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: false

      - name: Run cargo-audit
        uses: rustsec/audit-check@e9159ac5f7d7d873ce074ca134da2f445c0a4a61 # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: Code Coverage
    runs-on: warp-ubuntu-latest-x64-4x
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration Tests (ExifTool Comparison)
    runs-on: warp-ubuntu-latest-x64-4x
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2
        with:
          cache-on-failure: true

      - name: Install Perl ExifTool
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl
          exiftool -ver

      - name: Build ExifTool-RS
        run: cargo build --release --all-features

      - name: Run integration tests with ExifTool comparison
        run: cargo test --release --features exiftool-comparison -- --nocapture

      - name: Generate comparison report
        if: always()
        run: |
          echo "# ExifTool Comparison Test Results" > comparison_report.md
          echo "" >> comparison_report.md
          echo "**Platform:** ubicloud-premium-30 (Ubuntu Linux)" >> comparison_report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> comparison_report.md
          echo "" >> comparison_report.md
          echo "See test output above for detailed match rates." >> comparison_report.md

      - name: Upload comparison report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: comparison-report
          path: comparison_report.md
          retention-days: 90

  benchmarks:
    name: Performance Benchmarks
    runs-on: warp-ubuntu-latest-x64-4x
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2
        with:
          cache-on-failure: true

      - name: Run benchmarks
        run: cargo bench --bench integration_benchmarks --bench parse_benchmarks

      # Note: Benchmark comparison action removed due to path globbing issues.
      # Benchmark results are still captured and uploaded as artifacts below.
      # For benchmark comparisons, review the uploaded artifacts manually.

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 90
