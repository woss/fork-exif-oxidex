name: Sync ExifTool Tags

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:  # Manual trigger

jobs:
  sync-tags:
    runs-on: arc-runner-set
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check ExifTool version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get currently cached version (if any)
          CURRENT=$(cat .exiftool-version 2>/dev/null || echo "none")

          # Get latest commit info from ExifTool official repository
          echo "Fetching latest ExifTool version from official repository..."
          COMMIT_JSON=$(gh api repos/exiftool/exiftool/commits/master)
          LATEST_FULL=$(echo "$COMMIT_JSON" | jq -r '.sha')
          LATEST=${LATEST_FULL:0:7}
          COMMIT_MSG=$(echo "$COMMIT_JSON" | jq -r '.commit.message' | head -1)

          # Extract version number from commit message (e.g., "Update to 13.43")
          if [[ "$COMMIT_MSG" =~ [0-9]+\.[0-9]+ ]]; then
            EXIFTOOL_VERSION="${BASH_REMATCH[0]}"
          else
            EXIFTOOL_VERSION="$LATEST"
          fi

          # Determine if we need to update
          VERSION_CHANGED="false"
          if [ "$CURRENT" != "$LATEST_FULL" ]; then
            VERSION_CHANGED="true"
            echo "✅ New version detected!"
            echo "   Cached version: $CURRENT"
            echo "   Latest version: $LATEST_FULL (v$EXIFTOOL_VERSION)"
          else
            echo "✅ Version unchanged - using cached version"
            echo "   Current version: $CURRENT (v$EXIFTOOL_VERSION)"
          fi

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "latest_full=$LATEST_FULL" >> $GITHUB_OUTPUT
          echo "exiftool_version=$EXIFTOOL_VERSION" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "version_changed=$VERSION_CHANGED" >> $GITHUB_OUTPUT

      - name: Setup Rust toolchain
        if: steps.check.outputs.version_changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        if: steps.check.outputs.version_changed == 'true'
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Regenerate tag database
        if: steps.check.outputs.version_changed == 'true'
        run: |
          echo "🔄 Version changed - regenerating tag database from ExifTool ${{ steps.check.outputs.exiftool_version }}"
          echo ""
          echo "Removing cached generated files to force regeneration..."
          rm -f src/tag_db/generated_tags.rs
          rm -rf target/*/build/oxidex-*/out/exiftool-source

          echo "Building to download and parse ExifTool v${{ steps.check.outputs.exiftool_version }} from official source..."
          cargo build --release

          echo "Saving ExifTool version..."
          echo "${{ steps.check.outputs.latest_full }}" > .exiftool-version

      - name: Count tags and analyze changes
        if: steps.check.outputs.version_changed == 'true'
        id: count
        run: |
          if [ -f src/tag_db/generated_tags.rs ]; then
            # Extract tag count from the generated_tag_count function
            # Pattern: pub fn generated_tag_count() -> usize {
            #              32681
            TAG_COUNT=$(grep -A 1 "pub fn generated_tag_count" src/tag_db/generated_tags.rs | tail -1 | grep -oE '[0-9]+')
            if [ -z "$TAG_COUNT" ]; then
              # Fallback: try extracting from function definition
              TAG_COUNT=$(sed -n '/pub fn generated_tag_count/,/^    }/p' src/tag_db/generated_tags.rs | grep -oE '[0-9]+' | head -1)
            fi
            echo "tag_count=${TAG_COUNT:-unknown}" >> $GITHUB_OUTPUT
          else
            echo "tag_count=unknown" >> $GITHUB_OUTPUT
          fi

          # Get commit dates for reference
          CURRENT_DATE=$(git log -1 --format=%ci ${{ steps.check.outputs.current }} 2>/dev/null || echo "unknown")
          LATEST_DATE=$(git log -1 --format=%ci ${{ steps.check.outputs.latest_full }} 2>/dev/null || echo "unknown")
          echo "current_date=$CURRENT_DATE" >> $GITHUB_OUTPUT
          echo "latest_date=$LATEST_DATE" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check.outputs.version_changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: sync tags from ExifTool v${{ steps.check.outputs.exiftool_version }}

            Automatically synced tag database from ExifTool master branch.
            Tag count: ${{ steps.count.outputs.tag_count }}

            ExifTool commit: https://github.com/exiftool/exiftool/commit/${{ steps.check.outputs.latest_full }}
          title: "Sync tags from ExifTool v${{ steps.check.outputs.exiftool_version }}"
          body: |
            ## 🔄 ExifTool Tag Database Sync

            Automatically synced metadata tag definitions from [ExifTool](https://exiftool.org/) master branch to keep the oxidex tag database current with the latest ExifTool releases.

            ### 📊 Sync Details

            | Field | Value |
            |-------|-------|
            | **ExifTool Version** | v${{ steps.check.outputs.exiftool_version }} |
            | **Source Commit** | [`${{ steps.check.outputs.latest }}`](https://github.com/exiftool/exiftool/commit/${{ steps.check.outputs.latest_full }}) |
            | **Commit Message** | ${{ steps.check.outputs.commit_msg }} |
            | **Previous Version** | `${{ steps.check.outputs.current }}` |
            | **Total Tags** | ${{ steps.count.outputs.tag_count }} tags |
            | **Synced Date** | ${{ steps.count.outputs.latest_date }} |

            ### 📝 What Changed

            This PR updates the tag database with new/modified metadata field definitions from ExifTool. The changes include:

            - **Tag Definitions**: Updated metadata tag names, descriptions, and groupings
            - **Data Types**: Any new or modified tag data type information
            - **Value Mappings**: Enumerations and value interpretations for tags
            - **Camera Makers**: Extended support for manufacturer-specific tags
            - **Format Support**: Additional or improved format-specific tags

            ### 📁 Files Modified

            1. **`src/tag_db/generated_tags.rs`**
               - Completely regenerated from ExifTool source
               - Contains ~${{ steps.count.outputs.tag_count }} tag definitions
               - Auto-generated by oxidex build system

            2. **`.exiftool-version`**
               - Updated to track the synced ExifTool commit SHA
               - Used for version reporting in oxidex

            ### 🏗️ What This Updates

            The tag database provides metadata field definitions for:
            - **EXIF Data**: Camera, lens, and exposure information
            - **IPTC Data**: Editorial metadata and keywords
            - **XMP Data**: Modern XML-based metadata standards
            - **PNG/GIF/TIFF**: Image format-specific metadata
            - **PDF/Office**: Document metadata
            - **Audio/Video**: Media file metadata

            Each tag definition includes:
            - Tag name and description
            - Data type and format
            - Group/category assignment
            - Value mappings (for enumerated types)
            - Maker-specific information

            ### ✅ Review Checklist

            - [ ] CI passes (full build + all tests)
            - [ ] Tag count is reasonable (~32,000+ expected)
            - [ ] No test regressions detected
            - [ ] Tag definitions are readable and complete
            - [ ] Commit message is informative

            ### 🔗 References

            - [ExifTool Official Site](https://exiftool.org/)
            - [ExifTool GitHub](https://github.com/exiftool/exiftool)
            - [Oxidex Tag Database](./src/tag_db/README.md)

            ---
            *Auto-generated by [sync-exiftool-tags.yml](/.github/workflows/sync-exiftool-tags.yml)*
          branch: auto-sync-exiftool-tags
          delete-branch: true
          labels: |
            automated
            dependencies

      - name: Summary
        if: always()
        run: |
          echo "📊 ExifTool Sync Workflow Summary"
          echo "=================================="
          echo ""
          echo "Current cached version: ${{ steps.check.outputs.current }}"
          echo "Latest ExifTool version: ${{ steps.check.outputs.latest_full }} (v${{ steps.check.outputs.exiftool_version }})"
          echo ""
          if [ "${{ steps.check.outputs.version_changed }}" = "true" ]; then
            echo "✅ Version changed - PR created with tag updates"
            echo "   Tag count: ${{ steps.count.outputs.tag_count }} tags"
          else
            echo "✅ Version unchanged - no update needed"
            echo "   Using cached ExifTool v${{ steps.check.outputs.exiftool_version }}"
          fi
