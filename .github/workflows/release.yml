name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g., v1.0.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: warp-ubuntu-latest-x64-4x
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Get version from tag
        id: get_version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_TAG"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@26994186c0ac3ef5cae75ac16aa32e8153525f77 # v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-alpha') || contains(steps.get_version.outputs.version, '-beta') || contains(steps.get_version.outputs.version, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (static musl) - native build on x64
          - target: x86_64-unknown-linux-musl
            os: warp-ubuntu-latest-x64-2x
            binary_name: exiftool-rs
            archive_name: exiftool-rs-x86_64-linux-musl.tar.gz

          # Linux ARM64 (static musl) - native build on arm64
          - target: aarch64-unknown-linux-musl
            os: warp-ubuntu-latest-arm64-2x
            binary_name: exiftool-rs
            archive_name: exiftool-rs-aarch64-linux-musl.tar.gz

          # macOS Apple Silicon - native build on arm64
          - target: aarch64-apple-darwin
            os: warp-macos-15-arm64-6x
            binary_name: exiftool-rs
            archive_name: exiftool-rs-aarch64-macos.tar.gz

          # Windows x86_64 - native build on x64
          - target: x86_64-pc-windows-msvc
            os: warp-windows-2025-x64-4x
            binary_name: exiftool-rs.exe
            archive_name: exiftool-rs-x86_64-windows.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Rust toolchain
        uses: WarpBuilds/cache@v1
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          key: ${{ runner.os }}-${{ runner.arch }}-rustup-${{ matrix.target }}-${{ hashFiles('**/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-rustup-${{ matrix.target }}-
            ${{ runner.os }}-${{ runner.arch }}-rustup-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: WarpBuilds/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-provider: warpbuild

      - name: Build (native)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify binary (Unix)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          ls -lh target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          file target/${{ matrix.target }}/release/${{ matrix.binary_name }} || true

      - name: Verify binary (Windows)
        if: contains(matrix.target, 'windows')
        shell: bash
        run: |
          ls -lh target/${{ matrix.target }}/release/${{ matrix.binary_name }}

      - name: Strip binary (non-Windows)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary_name }} || true

      - name: Create archive (Linux/macOS)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive_name }} ${{ matrix.binary_name }}
          cd ../../..
          shasum -a 256 ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256

      - name: Create archive (Windows)
        if: contains(matrix.target, 'windows')
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a -tzip ../../../${{ matrix.archive_name }} ${{ matrix.binary_name }}
          cd ../../..
          sha256sum ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256

      - name: Display binary size (Unix)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          ls -lh ${{ matrix.archive_name }}
          echo "SHA256:"
          cat ${{ matrix.archive_name }}.sha256

      - name: Display binary size (Windows)
        if: contains(matrix.target, 'windows')
        shell: bash
        run: |
          ls -lh ${{ matrix.archive_name }}
          echo "SHA256:"
          cat ${{ matrix.archive_name }}.sha256

      - name: Upload binary to release
        uses: softprops/action-gh-release@26994186c0ac3ef5cae75ac16aa32e8153525f77 # v1
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-release:
    name: Verify Release
    needs: [create-release, build-binaries]
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Check release artifacts
        run: |
          echo "Release ${{ needs.create-release.outputs.version }} completed"
          echo "Expected artifacts:"
          echo "  - exiftool-rs-x86_64-linux-musl.tar.gz"
          echo "  - exiftool-rs-aarch64-linux-musl.tar.gz"
          echo "  - exiftool-rs-aarch64-macos.tar.gz"
          echo "  - exiftool-rs-x86_64-windows.zip"
          echo "  + corresponding .sha256 checksums"
