name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'benches/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if benchmarks changed
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^benches/|^src/'; then
            echo "benchmarks_changed=true" >> $GITHUB_OUTPUT
          else
            echo "benchmarks_changed=false" >> $GITHUB_OUTPUT
          fi
          # Always run benchmarks on workflow_dispatch or workflow file changes
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "benchmarks_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Rust toolchain
        if: steps.changes.outputs.benchmarks_changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Run benchmarks
        if: steps.changes.outputs.benchmarks_changed == 'true'
        run: cargo bench --bench integration_benchmarks --bench parse_benchmarks

      - name: Update benchmark metadata in docs
        if: steps.changes.outputs.benchmarks_changed == 'true'
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          COMMIT=$(git rev-parse --short HEAD)
          sed -i "s/- \*\*Date:\*\* .*/- **Date:** $DATE/" docs/performance/index.md
          sed -i "s/- \*\*Commit:\*\* .*/- **Commit:** [\`$COMMIT\`](https:\/\/github.com\/swack-tools\/oxidex\/commit\/$COMMIT)/" docs/performance/index.md

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs

      - name: Build VitePress site
        run: npm run docs:build
        working-directory: docs

      - name: Copy benchmark reports to site
        if: steps.changes.outputs.benchmarks_changed == 'true'
        run: |
          mkdir -p docs/.vitepress/dist/benchmarks
          cp -r target/criterion/* docs/.vitepress/dist/benchmarks/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
