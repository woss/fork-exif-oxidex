name: Test

on:
  push:
    branches: ["main"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 1
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  test:
    name: Test Suite
    runs-on: warp-ubuntu-latest-x64-2x
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@89e9040de88b577a072e3760aaf59f585da083af # v0.0.5

      - name: Setup Rust cache
        uses: WarpBuilds/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build
        run: cargo build --release --verbose --all-features

      - name: Run tests
        run: cargo test --verbose --all-features

  clippy:
    name: Clippy Lints
    runs-on: warp-ubuntu-latest-x64-2x
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: false

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@89e9040de88b577a072e3760aaf59f585da083af # v0.0.5

      - name: Setup Rust cache
        uses: WarpBuilds/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --all-features -- -D warnings

  fmt:
    name: Code Formatting
    runs-on: warp-ubuntu-latest-x64-2x
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: false

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  integration-tests:
    name: Integration Tests (ExifTool Comparison)
    runs-on: warp-ubuntu-latest-x64-2x
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Setup Rust cache
        uses: WarpBuilds/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Cache Perl ExifTool
        id: cache-exiftool
        uses: WarpBuilds/cache@v1
        with:
          path: |
            /usr/bin/exiftool
            /usr/share/perl5/Image
          key: ${{ runner.os }}-exiftool-${{ hashFiles('/etc/apt/sources.list') }}
          restore-keys: |
            ${{ runner.os }}-exiftool-

      - name: Install Perl ExifTool
        if: steps.cache-exiftool.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl

      - name: Verify ExifTool installation
        run: exiftool -ver

      - name: Build ExifTool-RS
        run: cargo build --release --all-features

      - name: Run integration tests with ExifTool comparison
        run: cargo test --release --features exiftool-comparison -- --nocapture
