name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: ["**"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 1
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  test:
    name: Test Suite
    runs-on: warp-ubuntu-latest-x64-2x
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: true

      - name: Cache Rust toolchain
        uses: WarpBuilds/cache@v1
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          key: ${{ runner.os }}-${{ runner.arch }}-rustup-stable-${{ hashFiles('**/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-rustup-stable-
            ${{ runner.os }}-${{ runner.arch }}-rustup-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@89e9040de88b577a072e3760aaf59f585da083af # v0.0.5

      - name: Setup Rust cache
        uses: WarpBuilds/rust-cache@v2
        with:
          cache-on-failure: true
          cache-provider: warpbuild

      - name: Build
        run: cargo build --release --verbose --all-features

      - name: Run tests
        run: cargo test --verbose --all-features

      - name: Install cbindgen
        run: |
          if ! command -v cbindgen &> /dev/null; then
            echo "cbindgen not found in cache, installing..."
            cargo install cbindgen --locked
          else
            echo "cbindgen found in cache: $(cbindgen --version)"
          fi

      - name: Verify C header is up-to-date
        run: |
          cbindgen --config cbindgen.toml --crate exiftool-rs --output api/exiftool_rs.h.tmp
          if ! diff -q api/exiftool_rs.h api/exiftool_rs.h.tmp; then
            echo "Error: C header file is out of date. Please regenerate it with:"
            echo "  cbindgen --config cbindgen.toml --crate exiftool-rs --output api/exiftool_rs.h"
            echo ""
            echo "Differences:"
            diff api/exiftool_rs.h api/exiftool_rs.h.tmp || true
            exit 1
          fi
          rm api/exiftool_rs.h.tmp
          echo "C header file is up-to-date"

  audit:
    name: Security Audit
    runs-on: warp-ubuntu-latest-x64-2x
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: false

      - name: Run cargo-audit
        uses: rustsec/audit-check@e9159ac5f7d7d873ce074ca134da2f445c0a4a61 # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  clippy:
    name: Clippy Lints
    runs-on: warp-ubuntu-latest-x64-2x
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: false

      - name: Cache Rust toolchain
        uses: WarpBuilds/cache@v1
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          key: ${{ runner.os }}-${{ runner.arch }}-rustup-stable-${{ hashFiles('**/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-rustup-stable-
            ${{ runner.os }}-${{ runner.arch }}-rustup-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@89e9040de88b577a072e3760aaf59f585da083af # v0.0.5

      - name: Setup Rust cache
        uses: WarpBuilds/rust-cache@v2
        with:
          cache-provider: warpbuild

      - name: Run Clippy
        run: cargo clippy --all-features -- -D warnings

  fmt:
    name: Code Formatting
    runs-on: warp-ubuntu-latest-x64-2x
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: false

      - name: Cache Rust toolchain
        uses: WarpBuilds/cache@v1
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          key: ${{ runner.os }}-${{ runner.arch }}-rustup-stable-rustfmt-${{ hashFiles('**/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-rustup-stable-rustfmt-
            ${{ runner.os }}-${{ runner.arch }}-rustup-stable-
            ${{ runner.os }}-${{ runner.arch }}-rustup-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  coverage:
    name: Code Coverage
    runs-on: warp-ubuntu-latest-x64-2x
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: true

      - name: Cache Rust toolchain
        uses: WarpBuilds/cache@v1
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          key: ${{ runner.os }}-${{ runner.arch }}-rustup-stable-${{ hashFiles('**/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-rustup-stable-
            ${{ runner.os }}-${{ runner.arch }}-rustup-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Setup Rust cache
        uses: WarpBuilds/rust-cache@v2
        with:
          cache-provider: warpbuild

      - name: Install cargo-tarpaulin
        run: |
          if ! command -v cargo-tarpaulin &> /dev/null; then
            echo "cargo-tarpaulin not found in cache, installing..."
            cargo install cargo-tarpaulin
          else
            echo "cargo-tarpaulin found in cache: $(cargo-tarpaulin --version)"
          fi

      - name: Generate coverage report
        run: cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration Tests (ExifTool Comparison)
    runs-on: warp-ubuntu-latest-x64-2x
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: true

      - name: Cache Rust toolchain
        uses: WarpBuilds/cache@v1
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          key: ${{ runner.os }}-${{ runner.arch }}-rustup-stable-${{ hashFiles('**/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-rustup-stable-
            ${{ runner.os }}-${{ runner.arch }}-rustup-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Setup Rust cache
        uses: WarpBuilds/rust-cache@v2
        with:
          cache-on-failure: true
          cache-provider: warpbuild

      - name: Install Perl ExifTool
        run: |
          if ! command -v exiftool &> /dev/null; then
            echo "ExifTool not found, installing..."
            sudo apt-get update -qq
            sudo apt-get install -y libimage-exiftool-perl
          else
            echo "ExifTool already installed: $(exiftool -ver)"
          fi

      - name: Build ExifTool-RS
        run: cargo build --release --all-features

      - name: Run integration tests with ExifTool comparison
        id: integration-tests
        continue-on-error: true
        run: |
          cargo test --release --features exiftool-comparison -- --nocapture 2>&1 | tee test_output.log
          echo "test_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Generate comparison report
        if: always()
        run: |
          echo "# ExifTool Comparison Test Results" > comparison_report.md
          echo "" >> comparison_report.md
          echo "**Platform:** ${{ runner.os }} (${{ runner.arch }})" >> comparison_report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> comparison_report.md
          echo "**Exit Code:** ${{ steps.integration-tests.outputs.test_exit_code }}" >> comparison_report.md
          echo "" >> comparison_report.md
          echo "## Test Output" >> comparison_report.md
          echo "" >> comparison_report.md
          echo '```' >> comparison_report.md
          if [ -f test_output.log ]; then
            cat test_output.log >> comparison_report.md
          else
            echo "No test output captured" >> comparison_report.md
          fi
          echo '```' >> comparison_report.md

      - name: Upload comparison report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: comparison-report
          path: comparison_report.md
          retention-days: 90

  benchmarks:
    name: Performance Benchmarks
    runs-on: warp-ubuntu-latest-x64-2x
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: true

      - name: Cache Rust toolchain
        uses: WarpBuilds/cache@v1
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          key: ${{ runner.os }}-${{ runner.arch }}-rustup-stable-${{ hashFiles('**/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-rustup-stable-
            ${{ runner.os }}-${{ runner.arch }}-rustup-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable

      - name: Setup Rust cache
        uses: WarpBuilds/rust-cache@v2
        with:
          cache-on-failure: true
          cache-provider: warpbuild
          prefix-key: "v1.0.9"

      - name: Run benchmarks
        run: cargo bench --bench integration_benchmarks --bench parse_benchmarks

      # Note: Benchmark comparison action removed due to path globbing issues.
      # Benchmark results are still captured and uploaded as artifacts below.
      # For benchmark comparisons, review the uploaded artifacts manually.

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 90

  publish-benchmarks:
    name: Publish Benchmarks to GitHub Pages
    runs-on: warp-ubuntu-latest-x64-2x
    needs: benchmarks
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: false

      - name: Download benchmark results
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: benchmark-results
          path: benchmark-results

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./benchmark-results
          destination_dir: benchmarks
          keep_files: false

  multi-platform-build:
    name: Multi-platform Build Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux ARM64 - native build on arm64
          - target: aarch64-unknown-linux-musl
            os: warp-ubuntu-latest-arm64-2x

          # Linux x86_64 - native build on x64
          - target: x86_64-unknown-linux-musl
            os: warp-ubuntu-latest-x64-2x

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          lfs: false

      - name: Cache Rust toolchain
        uses: WarpBuilds/cache@v1
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          key: ${{ runner.os }}-${{ runner.arch }}-rustup-${{ matrix.target }}-${{ hashFiles('**/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-rustup-${{ matrix.target }}-
            ${{ runner.os }}-${{ runner.arch }}-rustup-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: WarpBuilds/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.target }}
          cache-provider: warpbuild

      - name: Build (native)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify binary
        run: |
          ls -lh target/${{ matrix.target }}/release/exiftool-rs
          file target/${{ matrix.target }}/release/exiftool-rs || true
