name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 1
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  # Fast checks that can fail early (runs in parallel with build-test)
  lint-fmt:
    name: Lint & Format
    runs-on: arc-runner-set
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (release profile)
        run: cargo clippy --release --all-features -- -D warnings

  # Main build and test job
  build-test:
    name: Build & Test
    runs-on: arc-runner-set
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Install cargo-nextest
        uses: taiki-e/install-action@735e5933943122c5ac182670a935f54a949265c1 # v2
        with:
          tool: cargo-nextest

      - name: Build (release)
        run: cargo build --release --all-features

      - name: Run tests (nextest)
        run: cargo nextest run --release --all-features

      - name: Run doc tests
        run: cargo test --doc --all-features

      - name: Verify C header is up-to-date
        run: |
          cbindgen --config cbindgen.toml --crate oxidex --output api/oxidex.h.tmp
          if ! diff -q api/oxidex.h api/oxidex.h.tmp; then
            echo "Error: C header file is out of date. Please regenerate it with:"
            echo "  cbindgen --config cbindgen.toml --crate oxidex --output api/oxidex.h"
            echo ""
            echo "Differences:"
            diff api/oxidex.h api/oxidex.h.tmp || true
            exit 1
          fi
          rm api/oxidex.h.tmp
          echo "C header file is up-to-date"

  # Security audit (runs in parallel)
  audit:
    name: Security Audit
    runs-on: arc-runner-set
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Run cargo-audit
        uses: rustsec/audit-check@e9159ac5f7d7d873ce074ca134da2f445c0a4a61 # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  integration-tests:
    name: Integration Tests (ExifTool Comparison)
    runs-on: arc-runner-set
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Install Perl ExifTool
        run: |
          if ! command -v exiftool &> /dev/null; then
            echo "ExifTool not found, installing..."
            sudo apt-get update -qq
            sudo apt-get install -y libimage-exiftool-perl
          else
            echo "ExifTool already installed: $(exiftool -ver)"
          fi

      - name: Build OxiDex
        run: cargo build --release --all-features

      - name: Run integration tests with ExifTool comparison
        id: integration-tests
        continue-on-error: true
        run: |
          cargo test --release --features exiftool-comparison -- --nocapture 2>&1 | tee test_output.log
          echo "test_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Generate comparison report
        if: always()
        run: |
          echo "# ExifTool Comparison Test Results" > comparison_report.md
          echo "" >> comparison_report.md
          echo "**Platform:** ${{ runner.os }} (${{ runner.arch }})" >> comparison_report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> comparison_report.md
          echo "**Exit Code:** ${{ steps.integration-tests.outputs.test_exit_code }}" >> comparison_report.md
          echo "" >> comparison_report.md
          echo "## Test Output" >> comparison_report.md
          echo "" >> comparison_report.md
          echo '```' >> comparison_report.md
          if [ -f test_output.log ]; then
            cat test_output.log >> comparison_report.md
          else
            echo "No test output captured" >> comparison_report.md
          fi
          echo '```' >> comparison_report.md

      - name: Upload comparison report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: comparison-report
          path: comparison_report.md
          retention-days: 90

  benchmarks:
    name: Performance Benchmarks
    runs-on: arc-runner-set
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Run benchmarks
        run: cargo bench --bench integration_benchmarks --bench parse_benchmarks

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 90

  multi-platform-build:
    name: Multi-platform Build Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux ARM64 - native build on arm64
          - target: aarch64-unknown-linux-musl
            os: warp-ubuntu-latest-arm64-2x

          # Linux x86_64 - native build on x64
          - target: x86_64-unknown-linux-musl
            os: arc-runner-set

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@5d458579430fc14a04a08a1e7d3694f545e91ce6 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget build-essential pkg-config libssl-dev
      - name: Install musl development tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools musl-dev

      - name: Build (native)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify binary
        run: |
          ls -lh target/${{ matrix.target }}/release/oxidex
          file target/${{ matrix.target }}/release/oxidex || true

  coverage:
    name: Code Coverage
    runs-on: arc-runner-set
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Generate coverage
        run: |
          cargo tarpaulin --verbose --all-features --workspace --timeout 300 --out xml --output-dir ./coverage
        env:
          CARGO_TERM_COLOR: always

      - name: Upload coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage/cobertura.xml
